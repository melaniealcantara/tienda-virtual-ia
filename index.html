<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tienda Virtual IA</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- CSS propio -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">
        <i class="fas fa-shopping-cart"></i> ShopMaster
      </a>
      <button class="btn btn-success position-relative" data-bs-toggle="offcanvas" data-bs-target="#carritoCanvas">
        <i class="fas fa-cart-plus"></i> Carrito
        <span id="contadorCarrito" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
      </button>
    </div>
  </nav>

  <!-- Encabezado -->
  <header class="py-5 text-center bg-light">
    <div class="container">
      <h1 class="fw-bold">🛍️ Tienda Virtual con IA</h1>
      <p class="lead">Explora productos, agrégalos al carrito y genera tu ticket térmico en PDF.</p>
    </div>
  </header>

  <!-- Productos -->
  <main class="container my-5">
    <div id="listaProductos" class="row g-4"></div>
  </main>

  <!-- Modal producto -->
  <div class="modal fade" id="modalProducto" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title">Detalle del producto</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="detalleProducto"></div>
      </div>
    </div>
  </div>

  <!-- Carrito lateral -->
  <div class="offcanvas offcanvas-end" tabindex="-1" id="carritoCanvas">
    <div class="offcanvas-header bg-success text-white">
      <h5 class="offcanvas-title">🛒 Carrito de compras</h5>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
      <div id="contenidoCarrito"></div>
      <hr>
      <h5>Total: $<span id="totalCarrito">0.00</span></h5>
      <button class="btn btn-primary w-100 mt-3" data-bs-toggle="modal" data-bs-target="#modalPago">
        <i class="fas fa-credit-card"></i> Ir a pagar
      </button>
    </div>
  </div>

  <!-- Modal pago -->
  <div class="modal fade" id="modalPago" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <form class="modal-content" id="formPago">
        <div class="modal-header bg-dark text-white">
          <h5 class="modal-title">💳 Pasarela de pago</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Nombre completo</label>
            <input type="text" class="form-control" id="nombreCliente" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Número de tarjeta</label>
            <input type="text" class="form-control" id="numeroTarjeta" maxlength="16" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Fecha de vencimiento</label>
            <input type="month" class="form-control" id="fechaVencimiento" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Código de seguridad</label>
            <input type="text" class="form-control" id="cvv" maxlength="4" required>
          </div>
        </div>
        <div class="modal-footer">
          <button type="submit" class="btn btn-success w-100">✅ Pagar ahora</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Librerías -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- JS propio -->
  <script src="script.js"></script>
</body>
</html>
